<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mystery Atlas - Mapping the Unexplained</title>
  <meta
    name="description"
    content="Explore haunted places, UFO hotspots, folklore sites, ley lines and unexplained mysteries from around the world."
  />

  <script type="module" src="/src/main.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    html,body{
      height:100%;
      width:100%;
      font-family:'Georgia',serif;
      background:linear-gradient(135deg,#08080d 0%,#151526 100%);
      color:#e0d8c3;
      overflow:hidden;
    }

    header{
      background:linear-gradient(135deg,#101018 0%,#25184f 100%);
      padding:1.3rem 1rem;
      text-align:center;
      border-bottom:3px double #c9a24e;
      box-shadow:0 4px 24px rgba(123,92,255,0.25);
    }

    h1{
      font-size:2.3rem;
      color:#e8d39a;
      text-shadow:0 0 15px rgba(232,211,154,0.45);
      margin:0;
      font-weight:bold;
      letter-spacing:0.03em;
    }

    .subtitle{
      font-size:1.05rem;
      color:#b8a07e;
      margin:0.4rem 0 0;
    }

    .description{
      max-width:760px;
      margin:0.6rem auto 0;
      font-size:0.95rem;
      line-height:1.4;
      color:#d7cfbd;
    }

    #controls{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:0.8rem;
      margin-top:1rem;
    }

    button{
      background:linear-gradient(135deg,#6c5ce7 0%,#8d79ff 100%);
      color:#fff;
      border:none;
      padding:0.8rem 1.5rem;
      border-radius:25px;
      cursor:pointer;
      font-weight:bold;
      font-size:1rem;
      box-shadow:0 4px 15px rgba(108,92,231,0.3);
      transition:all 0.3s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(108,92,231,0.45);
    }

    #leyToggle{
      background:linear-gradient(135deg,#8b5e1f 0%,#c9a24e 100%);
    }

    .category-bar{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:0.5rem;
      margin-top:0.9rem;
    }

    .category-pill{
      font-size:0.8rem;
      padding:0.35rem 0.75rem;
      border:1px solid rgba(201,162,78,0.45);
      border-radius:999px;
      color:#e8d39a;
      background:rgba(255,255,255,0.06);
    }

    #map{
      height:100%;
      width:100%;
    }

    footer{
      text-align:center;
      padding:0.8rem;
      background:linear-gradient(135deg,#101018 0%,#25184f 100%);
      color:#9d8d6f;
      border-top:3px double #c9a24e;
      font-size:0.9rem;
    }

    .book-btn{
      background:linear-gradient(135deg,#6c5ce7 0%,#8d79ff 100%)!important;
      width:100%!important;
      margin-top:10px!important;
    }
  </style>
</head>

<body>
  <header>
    <h1>🧭 Mystery Atlas</h1>
    <p class="subtitle">Mapping the Unexplained</p>
    <p class="description">
      Discover haunted locations, UFO encounters, folklore sites, ley lines and unexplained mysteries from around the world.
    </p>

    <div id="controls">
      <button id="gpsBtn">📍 Near Me</button>
      <button id="leyToggle">⚡ Ley Lines</button>
    </div>

    <div class="category-bar">
      <span class="category-pill">All</span>
      <span class="category-pill">Haunted</span>
      <span class="category-pill">UFO</span>
      <span class="category-pill">Folklore</span>
      <span class="category-pill">Cryptid</span>
      <span class="category-pill">Unexplained</span>
    </div>
  </header>

  <div id="map"></div>

  <footer>
    Explore the world’s mysteries • Ley line overlay is a paranormal theory layer
  </footer>
</body>
</html>
