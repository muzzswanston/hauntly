<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Mystery Atlas</title>

  <script type="module" src="/src/location.js"></script>

  <style>
    body{
      margin:0;
      background:#08080d;
      color:#e0d8c3;
      font-family:Georgia,serif;
    }

    .container{
      max-width:1000px;
      margin:auto;
      padding:2rem;
    }

    .hero{
      width:100%;
      height:400px;
      object-fit:cover;
      border-radius:12px;
    }

    h1{
      color:#e8d39a;
      margin-top:1rem;
    }

    .section{
      margin-top:2rem;
      padding:1rem;
      background:#101018;
      border:1px solid #c9a24e;
      border-radius:12px;
    }

    h2{
      color:#e8d39a;
      margin-top:0;
    }

    .back-link{
      display:inline-block;
      margin-bottom:1rem;
      color:#c9a24e;
      text-decoration:none;
    }

    #nearbyList a{
      display:block;
      margin:.5rem 0;
      color:#e8d39a;
    }
  </style>
</head>
<body>

<div class="container">

  <a href="/" class="back-link">← Back to Map</a>

  <img id="heroImage" class="hero" />

  <h1 id="title"></h1>

  <div class="section">
    <h2>Description</h2>
    <p id="description"></p>
  </div>

  <div class="section">
    <h2>History</h2>
    <p id="history"></p>
  </div>

  <div class="section">
    <h2>Reported Activity</h2>
    <p id="activity"></p>
  </div>

  <div class="section">
    <h2>Visitor Information</h2>
    <p id="visitorInfo"></p>
  </div>

  <div class="section">
    <h2>Nearby Mysteries</h2>
    <div id="nearbyList"></div>
  </div>

</div>

</body>
</html>
