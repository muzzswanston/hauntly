<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Mystery Atlas</title>
  <meta name="description" content="Explore this mystery location on Mystery Atlas." />

  <script type="module" src="/src/location.js"></script>

  <style>
    *{box-sizing:border-box;}

    body{
      margin:0;
      background:#08080d;
      color:#e0d8c3;
      font-family:Georgia,serif;
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:1.25rem;
    }

    .back-link{
      display:inline-block;
      margin-bottom:1rem;
      color:#c9a24e;
      text-decoration:none;
      font-weight:bold;
    }

    .hero{
      width:100%;
      height:380px;
      object-fit:cover;
      border-radius:16px;
      border:1px solid rgba(201,162,78,.45);
      background:#111;
    }

    h1{
      color:#e8d39a;
      margin:1rem 0 .75rem;
      font-size:2.2rem;
      line-height:1.1;
    }

    .layout{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:1.25rem;
      align-items:start;
    }

    .section{
      margin-top:1.25rem;
      padding:1rem;
      background:#101018;
      border:1px solid #c9a24e;
      border-radius:12px;
    }

    h2{
      color:#e8d39a;
      margin-top:0;
      font-size:1.25rem;
    }

    p{
      line-height:1.55;
    }

    #metaPanel{
      display:grid;
      gap:.75rem;
    }

    .meta-item{
      padding:.75rem;
      background:#1b1b2f;
      border-radius:10px;
      border:1px solid rgba(201,162,78,.25);
      line-height:1.4;
    }

    .meta-item strong{
      color:#e8d39a;
    }

    .meta-item a,
    #nearbyList a{
      color:#e8d39a;
      text-decoration:none;
    }

    #nearbyList a{
      display:block;
      margin:.6rem 0;
      padding:.75rem;
      background:#1b1b2f;
      border-radius:8px;
    }

    #nearbyList a:hover{
      background:rgba(201,162,78,.18);
    }

    @media(max-width:800px){
      .container{
        padding:1rem;
      }

      .hero{
        height:240px;
      }

      h1{
        font-size:1.7rem;
      }

      .layout{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="/" class="back-link">← Back to Map</a>

    <img id="heroImage" class="hero" alt="Mystery Atlas location image" />

    <h1 id="title"></h1>

    <div class="layout">
      <main>
        <div class="section">
          <h2>Description</h2>
          <p id="description"></p>
        </div>

        <div class="section">
          <h2>History</h2>
          <p id="history"></p>
        </div>

        <div class="section">
          <h2>Reported Activity</h2>
          <p id="activity"></p>
        </div>

        <div class="section">
          <h2>Visitor Information</h2>
          <p id="visitorInfo"></p>
        </div>

        <div class="section">
          <h2>Nearby Mysteries</h2>
          <div id="nearbyList"></div>
        </div>
      </main>

      <aside>
        <div class="section">
          <h2>Details</h2>
          <div id="metaPanel"></div>
        </div>
      </aside>
    </div>
  </div>
</body>
</html>
